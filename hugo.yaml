baseURL: "https://arcosdiaz.com/"
title: "Dario Arcos-Díaz, PhD"
theme: PaperMod
paginate: 15
enableRobotsTXT: true
buildDrafts: false
buildFuture: false

minify:
  disableXML: true
  minifyOutput: true

services:
  googleAnalytics:
    id: G-2Q04SCXNNC

params:
  mainSections:
    - posts
  description: "Senior Data Scientist with a PhD in Molecular Neuroscience. I apply machine learning to problems in the life sciences, from genomic data and knowledge graphs to network simulations. Currently building computational biology and bioinformatics projects."
  author: Dario Arcos-Díaz
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  math: true
  socialIcons:
    - name: twitter
      url: "https://twitter.com/darioarcosdiaz"
    - name: github
      url: "https://github.com/dariodata"
    - name: linkedin
      url: "https://www.linkedin.com/in/arcosdiaz/"
  homeInfoParams:
    Title: "Dario Arcos-Díaz, PhD"
    Content: "Senior Data Scientist with a PhD in Molecular Neuroscience. I apply machine learning to problems in the life sciences, from genomic data and knowledge graphs to network simulations. Currently building computational biology and bioinformatics projects."

markup:
  goldmark:
    extensions:
      passthrough:
        delimiters:
          block:
            - - $$
              - $$
          inline:
            - - \(
              - \)
        enable: true

menu:
  main:
    - identifier: about
      name: About
      url: /about/
      weight: 10
    - identifier: bio
      name: Bio Explorer
      url: https://bio.arcosdiaz.com
      weight: 15
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20

outputs:
  home:
    - HTML
    - RSS
    - JSON

taxonomies:
  tag: tags
